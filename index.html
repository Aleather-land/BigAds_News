<!doctype html>
<html lang="en-gb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BigAds News Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --gap: 16px;
      --tileHeight: 520px;
      --listHeight: 420px;
      --fbMaxH: 680px;
    }

    body{
      margin:0;
      padding:16px;
      font-family:"Fredoka", system-ui, sans-serif;
      background:#fff;
    }

    /* ===== Breaking ticker ===== */
    .breaking-wrap{
      border:1px solid #e6e6e6;
      border-radius:16px;
      padding:12px 14px;
      margin-bottom: var(--gap);
      background:#fff;
    }
    .breaking-head{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .breaking-title{
      margin:0;
      font-size:18px;
      font-weight:600;
      letter-spacing:0.3px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .badge{
      display:inline-block;
      font-size:12px;
      font-weight:600;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid #ddd;
    }
    .breaking-updated{
      font-size:12px;
      opacity:0.75;
      font-weight:600;
      white-space:nowrap;
    }
    .ticker{
      position:relative;
      overflow:hidden;
      border-radius:12px;
      border:1px solid #eee;
      background:#fafafa;
      height: 44px;
      display:flex;
      align-items:center;
    }
    .ticker-track{
      display:inline-flex;
      gap: 28px;
      white-space:nowrap;
      will-change: transform;
      animation: marquee 150s linear infinite;
      padding-left: 100%;
    }
    .ticker:hover .ticker-track{ animation-play-state: paused; }
    @keyframes marquee{
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    .ticker a{
      text-decoration:none;
      color: inherit;
      font-weight:600;
      opacity:0.95;
    }
    .ticker a:hover{ text-decoration: underline; }
    .dot{ opacity:0.35; font-weight:600; }

    /* ===== Grid (3x2 achieved by 2 columns with 6 tiles) ===== */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--gap);
      margin-bottom: var(--gap);
    }
    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
      :root{ --tileHeight: 560px; --listHeight: 460px; }
      .ticker-track{ animation-duration: 65s; }
    }

    .tile{
      border:1px solid #e6e6e6;
      border-radius:16px;
      padding:14px;
      background:#fff;
      height: var(--tileHeight);
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
    }
    .title{
      font-size:22px;
      margin:0 0 6px 0;
      font-weight:600;
      letter-spacing:0.4px;
    }
    .subtitle{
      margin:0 0 10px 0;
      opacity:0.85;
      font-weight:600;
      font-size:14px;
      line-height:1.3;
    }
    .scroll{
      overflow-y:auto;
      padding-right:10px;
      max-height: var(--listHeight);
    }
    .item{
      display:flex;
      gap:12px;
      margin:0 0 12px 0;
      align-items:flex-start;
    }
    .thumb{
      width:110px;
      height:62px;
      object-fit:cover;
      border-radius:12px;
      flex:0 0 auto;
      background:#f2f2f2;
    }
    .text{ flex:1; }
    .grid a{ color:inherit; text-decoration:none; }
    .grid a:hover{ text-decoration:underline; }
    .date{ opacity:0.7; font-size:12px; margin-top:4px; display:block; }
    .loading{ opacity:0.75; }
    .error{
      padding:10px;
      border:1px solid #ddd;
      border-radius:12px;
      background:#fff;
    }

    /* ===== Facebook section ===== */
    .fb-wrap{
      border:1px solid #e6e6e6;
      border-radius:16px;
      padding:14px;
      background:#fff;
    }
    .fb-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .fb-controls{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    button{
      font: inherit;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover{ background:#f4f4f4; }
    .hint{ font-size:12px; opacity:.75; font-weight:600; }

    .fb-scroll{
      max-height: var(--fbMaxH);
      overflow-y:auto;
      padding-right:10px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <!-- Breaking News ticker -->
  <section class="breaking-wrap" aria-label="Breaking news">
    <div class="breaking-head">
      <h2 class="breaking-title">
        <span class="badge">BREAKING</span>
        Headlines
      </h2>
      <div class="breaking-updated" id="breaking-updated">Updated: …</div>
    </div>
    <div class="ticker">
      <div class="ticker-track" id="breaking-track">
        <span class="loading">Loading headlines…</span>
      </div>
    </div>
  </section>

  <!-- 3x2 dashboard -->
  <div class="grid" id="dashboard"></div>

  <!-- Facebook feed -->
  <section class="fb-wrap" aria-label="HamiltonJet Global Facebook feed">
    <div class="fb-head">
      <div>
        <h2 class="title" style="margin:0;">HamiltonJet Global • Facebook</h2>
        <div class="subtitle" style="margin:4px 0 0 0;">Latest posts</div>
      </div>

      <div class="fb-controls">
        <button id="fbToggle">Pause auto-scroll</button>
        <span class="hint">Hover the feed to pause • scroll manually anytime</span>
      </div>
    </div>

    <!-- Facebook SDK (once per page) -->
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous"
      src="https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v19.0">
    </script>

    <div class="fb-scroll" id="fbScrollBox">
      <div class="fb-page"
        data-href="https://www.facebook.com/HamiltonJetGlobal"
        data-tabs="timeline"
        data-width="500"
        data-height="1200"
        data-small-header="false"
        data-adapt-container-width="true"
        data-hide-cover="false"
        data-show-facepile="false">
        <blockquote cite="https://www.facebook.com/HamiltonJetGlobal" class="fb-xfbml-parse-ignore">
          <a href="https://www.facebook.com/HamiltonJetGlobal">HamiltonJet Global</a>
        </blockquote>
      </div>
    </div>
  </section>

  <script>
    /******************** CONFIG ********************/
    const maxItems = 12;

    // Timezone for all "Updated" stamps (null = viewer local)
    const forceTimeZone = "Pacific/Auckland";

    // Breaking ticker feed
    const breakingFeed = {
      url: "https://feeds.bbci.co.uk/news/rss.xml",
      maxHeadlines: 12,
      refreshMs: 5 * 60 * 1000
    };

    // 3x2 feeds
    const feeds = [
      { name: "BBC • Top Stories",              url: "https://feeds.bbci.co.uk/news/rss.xml" },
      { name: "BBC • Science & Environment",    url: "https://feeds.bbci.co.uk/news/science_and_environment/rss.xml" },
      { name: "BBC • Technology",               url: "https://feeds.bbci.co.uk/news/technology/rss.xml" },
      { name: "BBC • Business",                 url: "https://feeds.bbci.co.uk/news/business/rss.xml" },
      { name: "RNZ • Morning Report (Podcast)", url: "https://www.rnz.co.nz/podcasts/morningreport.rss" },
      { name: "RNZ • Midday Report (Podcast)",  url: "https://www.rnz.co.nz/podcasts/middayreport.rss" }
    ];

    /******************** Helpers ********************/
    const dash = document.getElementById("dashboard");

    function apiFor(feedUrl){
      return "https://api.rss2json.com/v1/api.json?rss_url=" +
        encodeURIComponent(feedUrl) + "&_=" + Date.now();
    }

    function parseDateSafe(x){
      const d = new Date(x);
      return isNaN(d.getTime()) ? null : d;
    }

    function computeUpdated(data){
      const feedDates = [data?.feed?.lastBuildDate, data?.feed?.pubDate, data?.feed?.updated]
        .map(parseDateSafe).filter(Boolean);
      const itemDates = (data?.items || []).map(i => parseDateSafe(i.pubDate)).filter(Boolean);
      const all = [...feedDates, ...itemDates];
      if (!all.length) return new Date();
      return new Date(Math.max(...all.map(d => d.getTime())));
    }

    function formatDT(d){
      const opts = { year:"numeric", month:"numeric", day:"numeric", hour:"numeric", minute:"2-digit" };
      if (forceTimeZone) opts.timeZone = forceTimeZone;
      return d.toLocaleString("en-GB", opts);
    }

    function getThumb(item){
      if (item.thumbnail) return item.thumbnail;

      // Only treat enclosure as an image if it says image/*
      if (item.enclosure && item.enclosure.link && (item.enclosure.type || "").startsWith("image/")) {
        return item.enclosure.link;
      }

      const html = (item.description || "") + " " + (item.content || "");
      const m = html.match(/<img[^>]+src="([^"]+)"/i);
      return m ? m[1] : "";
    }

    function safeLink(item){
      return item.link || "#";
    }

    /******************** Breaking ticker ********************/
    const breakingTrack = document.getElementById("breaking-track");
    const breakingUpdated = document.getElementById("breaking-updated");

    async function loadBreaking(){
      try{
        const res = await fetch(apiFor(breakingFeed.url), { cache: "no-store" });
        const data = await res.json();
        if (!data || !data.items) throw new Error(data?.message || "No items returned");

        const updatedStr = formatDT(computeUpdated(data));
        breakingUpdated.textContent = "Updated: " + updatedStr + (forceTimeZone ? " (" + forceTimeZone + ")" : "");

        const items = data.items.slice(0, breakingFeed.maxHeadlines);
        const line = items.map(it => {
          const title = (it.title || "").trim();
          const link = safeLink(it);
          return `<a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a>`;
        }).join(` <span class="dot">•</span> `);

        breakingTrack.innerHTML = `<span>${line}</span> <span class="dot">•</span> <span>${line}</span>`;
      } catch(err){
        console.error("Breaking ticker error:", err);
        breakingUpdated.textContent = "Updated: unavailable";
        breakingTrack.innerHTML = `<span class="loading">Couldn’t load breaking headlines.</span>`;
      }
    }
    loadBreaking();
    setInterval(loadBreaking, breakingFeed.refreshMs);

    /******************** Grid tiles ********************/
    feeds.forEach((f, idx) => {
      const tile = document.createElement("section");
      tile.className = "tile";
      tile.id = "tile-" + idx;

      tile.innerHTML = `
        <h2 class="title">${f.name}</h2>
        <div class="subtitle">Latest • Updated: …</div>
        <div class="loading">Fetching feed…</div>
      `;

      dash.appendChild(tile);

      fetch(apiFor(f.url), { cache: "no-store" })
        .then(r => r.json())
        .then(data => {
          if (!data || !data.items) throw new Error(data?.message || "No items returned");

          const updatedStr = formatDT(computeUpdated(data));
          const itemsHtml = data.items.slice(0, maxItems).map(item => {
            const thumb = getThumb(item);
            const link = safeLink(item);
            const date = item.pubDate ? formatDT(new Date(item.pubDate)).split(",")[0] : "";

            return `
              <article class="item">
                ${thumb ? `
                  <a href="${link}" target="_blank" rel="noopener noreferrer">
                    <img class="thumb" src="${thumb}" alt="">
                  </a>` : ""}
                <div class="text">
                  <a href="${link}" target="_blank" rel="noopener noreferrer"><strong>${item.title}</strong></a>
                  <small class="date">${date}</small>
                </div>
              </article>
            `;
          }).join("");

          tile.innerHTML = `
            <h2 class="title">${f.name}</h2>
            <div class="subtitle">Latest • Updated: ${updatedStr}${forceTimeZone ? " (" + forceTimeZone + ")" : ""}</div>
            <div class="scroll">${itemsHtml || "<p>No items found.</p>"}</div>
          `;
        })
        .catch(err => {
          console.error("Feed error:", f.name, err);
          tile.innerHTML = `
            <h2 class="title">${f.name}</h2>
            <div class="error">
              <strong>Feed unavailable right now.</strong><br>
              <small>${String(err)}</small>
            </div>
          `;
        });
    });

    /******************** Facebook slow auto-scroll ********************
     * Note: We can ONLY scroll the outer container. We cannot autoplay videos
     * or control scrolling inside Facebook’s iframe.
     *******************************************************************/
    const fbBox = document.getElementById("fbScrollBox");
    const fbToggle = document.getElementById("fbToggle");

    let fbRunning = true;

    // Slower/faster: pixels per second
    const fbSpeedPxPerSec = 0.35;

    // Start later because FB iframe loads slowly
    const fbStartDelayMs = 8000;

    // Use a steady timer (more reliable than rAF in some embed contexts)
    const tickMs = 50;

    let fbTimer = null;

    function fbStart(){
      if (fbTimer) return;
      fbTimer = setInterval(() => {
        if (!fbRunning) return;

        // Only scroll when there’s actually something to scroll
        if (fbBox.scrollHeight <= fbBox.clientHeight + 2) return;

        fbBox.scrollTop += fbSpeedPxPerSec * (tickMs / 1000);

        const atBottom = fbBox.scrollTop + fbBox.clientHeight >= fbBox.scrollHeight - 2;
        if (atBottom) fbBox.scrollTop = 0;
      }, tickMs);
    }

    function fbStop(){
      if (!fbTimer) return;
      clearInterval(fbTimer);
      fbTimer = null;
    }

    // Pause on hover so you can read / click without fighting it
    fbBox.addEventListener("mouseenter", () => fbRunning = false);
    fbBox.addEventListener("mouseleave", () => fbRunning = true);

    // Toggle button
    fbToggle.addEventListener("click", () => {
      fbRunning = !fbRunning;
      fbToggle.textContent = fbRunning ? "Pause auto-scroll" : "Resume auto-scroll";
    });

    // Kick off after delay
    setTimeout(fbStart, fbStartDelayMs);
  </script>
</body>
</html>
