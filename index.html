<!doctype html>
<html lang="en-gb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BigAds News Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root { color-scheme: light dark; }

    /* Theme variables (default = light) */
    :root{
      --gap: 16px;
      --tileHeight: 520px;
      --listHeight: 420px;

      --bg: #ffffff;
      --panel: #ffffff;
      --panel2: #fafafa;
      --border: #e6e6e6;
      --border2: #eeeeee;

      --text: #111111;
      --muted: rgba(17,17,17,0.70);
      --muted2: rgba(17,17,17,0.55);

      --thumbBg: #f2f2f2;
    }

    /* Dark mode overrides */
    @media (prefers-color-scheme: dark){
      :root{
        --bg: #0f1115;
        --panel: #151823;
        --panel2: #10131c;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.08);

        --text: #f3f4f6;
        --muted: rgba(243,244,246,0.75);
        --muted2: rgba(243,244,246,0.55);

        --thumbBg: rgba(255,255,255,0.08);
      }
    }

    body{
      margin:0;
      padding:16px;
      font-family:"Fredoka", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ===== Ticker sections ===== */
    .wrap{
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px 14px;
      margin-bottom: var(--gap);
      background: var(--panel);
    }

    .head{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .head-title{
      margin:0;
      font-size:18px;
      font-weight:600;
      letter-spacing:0.3px;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .badge{
      display:inline-block;
      font-size:12px;
      font-weight:600;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      background: transparent;
      color: var(--text);
    }

    .meta{
      opacity:.75;
      font-weight:600;
      font-size:12px;
      color:var(--muted);
    }

    .ticker{
      position:relative;
      overflow:hidden;
      border-radius:12px;
      border:1px solid var(--border2);
      background: var(--panel2);
      height: 44px;
      display:flex;
      align-items:center;
    }

    .ticker-track{
      display:inline-flex;
      gap: 28px;
      white-space:nowrap;
      will-change: transform;
      animation: marquee 150s linear infinite;
      padding-left: 100%;
    }

    .ticker:hover .ticker-track{ animation-play-state: paused; }

    @keyframes marquee{
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }

    .ticker a{
      text-decoration:none;
      color: var(--text);
      font-weight:600;
      opacity:0.95;
    }
    .ticker a:hover{ text-decoration: underline; }

    .dot{ opacity:0.35; font-weight:600; color: var(--text); }
    .loading{ color: var(--muted); }

    /* ===== Grid ===== */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--gap);
      margin-bottom: var(--gap);
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
      :root{ --tileHeight: 560px; --listHeight: 460px; }
      .ticker-track{ animation-duration: 65s; }
    }

    .tile{
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      background: var(--panel);
      height: var(--tileHeight);
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
    }

    .title{
      font-size:22px;
      margin:0 0 6px 0;
      font-weight:600;
      letter-spacing:0.4px;
    }

    .subtitle{
      margin:0 0 10px 0;
      color: var(--muted);
      font-weight:600;
      font-size:14px;
      line-height:1.3;
    }

    .scroll{
      overflow-y:auto;
      padding-right:10px;
      max-height: var(--listHeight);
    }

    .item{
      display:flex;
      gap:12px;
      margin:0 0 12px 0;
      align-items:flex-start;
    }

    .thumb{
      width:110px;
      height:62px;
      object-fit:cover;
      border-radius:12px;
      flex:0 0 auto;
      background: var(--thumbBg);
    }

    .text{ flex:1; }

    .grid a{
      color: var(--text);
      text-decoration:none;
    }
    .grid a:hover{ text-decoration:underline; }

    .date{
      color: var(--muted2);
      font-size:12px;
      margin-top:4px;
      display:block;
    }

    .error{
      padding:10px;
      border:1px solid var(--border);
      border-radius:12px;
      background: var(--panel2);
      color: var(--text);
    }
  </style>
</head>

<body>

  <!-- BBC Breaking ticker -->
  <section class="wrap" aria-label="BBC breaking headlines">
    <div class="head">
      <h2 class="head-title"><span class="badge">BBC</span>Breaking headlines</h2>
      <div class="meta">Latest</div>
    </div>
    <div class="ticker">
      <div class="ticker-track" id="bbc-track">
        <span class="loading">Loading BBC headlines…</span>
      </div>
    </div>
  </section>

  <!-- RNZ NZ News ticker -->
  <section class="wrap" aria-label="NZ news headlines">
    <div class="head">
      <h2 class="head-title"><span class="badge">NZ</span>RNZ NZ News</h2>
      <div class="meta">Latest</div>
    </div>
    <div class="ticker">
      <div class="ticker-track" id="rnz-track">
        <span class="loading">Loading NZ headlines…</span>
      </div>
    </div>
  </section>

  <!-- 3x2 dashboard -->
  <div class="grid" id="dashboard"></div>

  <script>
    /******************** CONFIG ********************/
    const maxItems = 7;

    // Tickers refresh every 5 minutes
    const TICKER_REFRESH_MS = 5 * 60 * 1000;

    // 10-minute full page refresh (visible tab only)
    const PAGE_REFRESH_MS = 10 * 60 * 1000;

    // Feeds
    const BBC_TOP = "https://feeds.bbci.co.uk/news/rss.xml";

    // RNZ news page is rnz.co.nz/news; the matching RSS feed is RNZ "National" news:
    // https://www.rnz.co.nz/rss/national.xml
    const RNZ_NZ_NEWS = "https://www.rnz.co.nz/rss/national.xml";

    // Your 3x2 grid feeds
    const feeds = [
      { name: "BBC • Top Stories",              url: "https://feeds.bbci.co.uk/news/rss.xml" },
      { name: "BBC • Science & Environment",    url: "https://feeds.bbci.co.uk/news/science_and_environment/rss.xml" },
      { name: "BBC • Technology",               url: "https://feeds.bbci.co.uk/news/technology/rss.xml" },
      { name: "BBC • Business",                 url: "https://feeds.bbci.co.uk/news/business/rss.xml" },
      { name: "RNZ • Morning Report (Podcast)", url: "https://www.rnz.co.nz/podcasts/morningreport.rss" },
      { name: "RNZ • Midday Report (Podcast)",  url: "https://www.rnz.co.nz/podcasts/middayreport.rss" },
      { name: "RNZ • News",                     url: "https://www.rnz.co.nz/rss/national.xml" },
      { name: "Stuff • News",                   url: "https://www.stuff.co.nz/rss" },
      { name: "Herald • News",                  url: "https://www.nzherald.co.nz/arc/outboundfeeds/rss/section/nz/?_website=nzh&outputType=xml" },
      //{ name: "Guardian• News",               url: "https://www.theguardian.com/international/rss" }   
      {name: "Google• News",                    url: "https://news.google.com/rss" } 
    ];

    // For more news sites try here: https://www.reddit.com/r/rss/comments/1hco1ur/best_rss_links_for_news/
    /******************** Helpers ********************/
    const dash = document.getElementById("dashboard");

    function apiFor(feedUrl){
      return "https://api.rss2json.com/v1/api.json?rss_url=" +
        encodeURIComponent(feedUrl) + "&_=" + Date.now();
    }

    function safeLink(item){
      return item.link || "#";
    }

    function getThumb(item){
      if (item.thumbnail) return item.thumbnail;

      // Only treat enclosure as an image if it says image/*
      if (item.enclosure && item.enclosure.link && (item.enclosure.type || "").startsWith("image/")) {
        return item.enclosure.link;
      }

      const html = (item.description || "") + " " + (item.content || "");
      const m = html.match(/<img[^>]+src="([^"]+)"/i);
      return m ? m[1] : "";
    }

    function formatDateOnly(pubDate){
      if (!pubDate) return "";
      const d = new Date(pubDate);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleDateString("en-GB");
    }

    function buildTickerLine(items){
      const line = items.map(it => {
        const title = (it.title || "").trim();
        const link = safeLink(it);
        return `<a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a>`;
      }).join(` <span class="dot">•</span> `);

      // Duplicate for smooth loop
      return `<span>${line}</span> <span class="dot">•</span> <span>${line}</span>`;
    }

    async function loadTicker(feedUrl, trackEl, label){
      try{
        const res = await fetch(apiFor(feedUrl), { cache: "no-store" });
        const data = await res.json();
        if (!data || !data.items) throw new Error(data?.message || "No items returned");
        const items = data.items.slice(0, 12);
        trackEl.innerHTML = buildTickerLine(items);
      } catch(err){
        console.error(label + " ticker error:", err);
        trackEl.innerHTML = `<span class="loading">Couldn’t load ${label} headlines.</span>`;
      }
    }

    /******************** Load tickers ********************/
    const bbcTrack = document.getElementById("bbc-track");
    const rnzTrack = document.getElementById("rnz-track");

    loadTicker(BBC_TOP, bbcTrack, "BBC");
    loadTicker(RNZ_NZ_NEWS, rnzTrack, "NZ");

    setInterval(() => loadTicker(BBC_TOP, bbcTrack, "BBC"), TICKER_REFRESH_MS);
    setInterval(() => loadTicker(RNZ_NZ_NEWS, rnzTrack, "NZ"), TICKER_REFRESH_MS);

    /******************** Grid tiles ********************/
    feeds.forEach((f, idx) => {
      const tile = document.createElement("section");
      tile.className = "tile";
      tile.id = "tile-" + idx;

      tile.innerHTML = `
        <h2 class="title">${f.name}</h2>
        <div class="subtitle">Latest</div>
        <div class="loading">Fetching feed…</div>
      `;

      dash.appendChild(tile);

      fetch(apiFor(f.url), { cache: "no-store" })
        .then(r => r.json())
        .then(data => {
          if (!data || !data.items) throw new Error(data?.message || "No items returned");

          const itemsHtml = data.items.slice(0, maxItems).map(item => {
            const thumb = getThumb(item);
            const link = safeLink(item);
            const date = formatDateOnly(item.pubDate);

            return `
              <article class="item">
                ${thumb ? `
                  <a href="${link}" target="_blank" rel="noopener noreferrer">
                    <img class="thumb" src="${thumb}" alt="">
                  </a>` : ""}
                <div class="text">
                  <a href="${link}" target="_blank" rel="noopener noreferrer"><strong>${item.title}</strong></a>
                  ${date ? `<small class="date">${date}</small>` : ""}
                </div>
              </article>
            `;
          }).join("");

          tile.innerHTML = `
            <h2 class="title">${f.name}</h2>
            <div class="subtitle">Latest</div>
            <div class="scroll">${itemsHtml || "<p>No items found.</p>"}</div>
          `;
        })
        .catch(err => {
          console.error("Feed error:", f.name, err);
          tile.innerHTML = `
            <h2 class="title">${f.name}</h2>
            <div class="error">
              <strong>Feed unavailable right now.</strong><br>
              <small>${String(err)}</small>
            </div>
          `;
        });
    });

    /******************** Auto refresh whole page every 10 mins (visible tab only) ********************/
    setInterval(() => {
      if (document.visibilityState === "visible") location.reload();
    }, PAGE_REFRESH_MS);
  </script>
</body>
</html>
